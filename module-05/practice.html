<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Treat yourself or a loved one to our finest ingredients for a moment of pure delight!"
    />
    <meta name="keywords" content="Chocolate, milk, cacao" />
    <title>My site</title>
    <link rel="shortcut icon" href="images/favicon.svg" type="image/svg" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Normalise -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/modern-normalize@2.0.0/modern-normalize.min.css"
    />
    <!-- Custom styles -->
    <link rel="stylesheet" href="./css/practice.css" />
  </head>
  <body>
    <table class="schedule-table">
      <caption class="table-caption">
        Course schedule — Summer 2024
      </caption>
      <thead>
        <tr>
          <th scope="col">Day</th>
          <th scope="col">Course</th>
          <th scope="col">Time</th>
          <th scope="col">Price</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th rowspan="2" scope="rowgroup">Mon</th>
          <td>HTML</td>
          <td>10:00</td>
          <td>2000 UAH</td>
        </tr>
        <tr>
          <td>CSS</td>
          <td>12:00</td>
          <td>2500 UAH</td>
        </tr>
        <tr>
          <th scope="row">Fri</th>
          <td>JavaScript</td>
          <td>14:00</td>
          <td>4000 UAH</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <th colspan="3" scope="row">Total</th>
          <td>8500 UAH</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
